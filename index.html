<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolsoChat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Aca es donde se pone todo -->
    <div id="principal">
        <div id="titulo"><h2 id="decano">DECANO</h2><img src="resources/Escudo_del_Club_Nacional_de_Football.svg.png" alt="" id="logo-titulo"><h2 id="rey">REY DE COPAS</h2></div>
        <img src="resources/atilio-stiker.png" class="sticker sticker-atilio" alt="Copa">
        <img src="resources/Libertadores.png" class="sticker sticker-libertadores" alt="Atilio">
        <img src="resources/suarez-stiker.png" class="sticker sticker-suarez" alt="Suarez">
        <img src="resources/intercontinental-stiker.png" class="sticker sticker-intercontinental" alt="Intercontinental">
        <div id="BolsoChat">
        <!--izquierda, la columna de los contactos -->
        <aside>
            <header><img src="resources/logo_rojo.png" alt="" id="logo-bienvenida">
            <h2 id="bolso-chat-titulo">BolsoChat</h2></header>
            <div id="chats">
                <div class="chat">
                    <img src="" alt="">
                    <div class="info">
                        <div class="info_superior">
                            <h3>Nombre</h3>
                            <span class="hora">hora</span>
                        </div>
                        <p id="ultMensaje">mensaje</p>
                    </div>
                </div>
            </div>
        </aside>
        <!--pantalla de bienvenida hasta que selecciona un mensaje -->
        <div id="pantalla-bienvenida">
            <div class="contenido-bienvenida">
                <img src="resources/logo_blanco.png" alt="Escudo Nacional" class="logo-bienvenida">
                <p>Selecciona una conversación de la izquierda para empezar a chatear. Se mas rapido que el galgo Villalba en recibir tus mensajes.</p>
            </div>
        </div>
        <!-- Pantalla de chat activo -->
        <main id="chat-activo">
            <header>
                <div class="encabezado">
                    <button class="boton-volver">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <img src="" alt="">
                    <h3>Nombre</h3>
                </div>
            </header>
            <div id="mensajes">
                <div class="mensaje">
                    <p>mensaje</p>
                    <p class="hora2">hora</p>
                </div>
            </div>
            <div id="input">
                <input type="file" id="imagen-selector" accept="image/*" style="display: none;">
                <label for="imagen-selector" class="upload-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
                </label>
                <input id="mensaje_input" type="text" placeholder="Escribe un mensaje...">
                <button id="enviar_btn">Enviar</button>
            </div>
        </main>
    </div>
    <footer id="pie-de-pagina">
        <p>Creado por Matías Parente para la materia Internet Ricas 2026</p>
    </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
